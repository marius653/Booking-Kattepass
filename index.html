<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kattepass Booking</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f7efe5, #fdfaf5);
      color: #2f2f2f;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .page {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid #eadfce;
      border-radius: 28px;
      padding: 36px;
      box-shadow: 0 20px 60px rgba(80, 60, 40, 0.12);
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    .cat-hint {
      font-size: 34px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 32px;
      font-weight: 650;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #756b60;
      font-size: 16px;
    }

    .calendar-card {
      background: #fffaf3;
      border: 1px solid #eadfce;
      border-radius: 22px;
      padding: 24px;
    }

    .calendar-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .calendar-title h2 {
      font-size: 22px;
      font-weight: 600;
    }

    .small-note {
      font-size: 14px;
      color: #8a7d70;
    }

    .weekdays,
    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .weekdays div {
      text-align: center;
      font-size: 13px;
      color: #8a7d70;
      padding-bottom: 8px;
    }

    .day {
      aspect-ratio: 1;
      border: none;
      border-radius: 14px;
      background: #f1eadf;
      color: #9a9085;
      font-size: 15px;
      cursor: not-allowed;
    }

    .day.empty {
      background: transparent;
      cursor: default;
    }

    .day.available {
      background: #efe0c8;
      color: #3c3026;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 600;
    }

    .day.available:hover {
      background: #d8b98c;
      transform: translateY(-2px);
    }

    .day.selected {
      background: #2f2a25;
      color: white;
    }

    .booking-area {
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .selected-text {
      color: #756b60;
      font-size: 15px;
    }

    .book-button {
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      background: #2f2a25;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .book-button:hover:not(:disabled) {
      background: #4a3f36;
      transform: translateY(-1px);
    }

    .book-button:disabled {
      background: #c7beb2;
      cursor: not-allowed;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(47, 42, 37, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      width: 50vw;
      min-width: 320px;
      max-width: 560px;
      min-height: 300px;
      background: #fffaf3;
      border: 1px solid #eadfce;
      border-radius: 30px;
      box-shadow: 0 30px 90px rgba(40, 30, 20, 0.25);
      padding: 42px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: popIn 0.25s ease;
    }

    .modal .cat {
      font-size: 46px;
      margin-bottom: 16px;
    }

    .modal h3 {
      font-size: 24px;
      font-weight: 650;
      margin-bottom: 14px;
    }

    .modal p {
      color: #5f554c;
      font-size: 17px;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .close-button {
      align-self: center;
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      background: #2f2a25;
      color: white;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .close-button:hover {
      background: #4a3f36;
      transform: translateY(-1px);
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.96) translateY(8px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 18px;
      }

      .page {
        padding: 24px;
      }

      .modal {
        width: 90vw;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header>
      <div class="cat-hint">🐾</div>
      <h1>Book kattepass</h1>
      <p class="subtitle">
        Rolig og trygt kattepass mens du er bortreist.
      </p>
    </header>

    <section class="calendar-card">
      <div class="calendar-title">
        <h2>Juli 2026</h2>
        <span class="small-note">Ledig: 04.–11. juli</span>
      </div>

      <div class="weekdays">
        <div>Man</div>
        <div>Tir</div>
        <div>Ons</div>
        <div>Tor</div>
        <div>Fre</div>
        <div>Lør</div>
        <div>Søn</div>
      </div>

      <div class="days" id="calendar"></div>

      <div class="booking-area">
        <p class="selected-text" id="selectedText">
          Velg en ledig dato i kalenderen.
        </p>

        <button class="book-button" id="bookButton" disabled>
          Book kattepass
        </button>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="cat">🐈</div>
      <h3>Booking bekreftet</h3>
      <p>
        Kattepass er booket fra 04. juli til 11. juli!<br>
        Kos deg på ferie ❤️
      </p>
      <button class="close-button" id="closeModal">
        Lukk
      </button>
    </div>
  </div>

  <script>
    const calendar = document.getElementById("calendar");
    const selectedText = document.getElementById("selectedText");
    const bookButton = document.getElementById("bookButton");
    const modalOverlay = document.getElementById("modalOverlay");
    const closeModal = document.getElementById("closeModal");

    const year = 2026;
    const month = 6; // Juli, siden JavaScript teller januar som 0
    const availableStart = 4;
    const availableEnd = 11;

    let weekSelected = false;

    function selectAvailableWeek() {
      document
        .querySelectorAll(".day.available")
        .forEach(button => button.classList.add("selected"));

      selectedText.textContent = "Valgt periode: 04. juli til 11. juli 2026";
      bookButton.disabled = false;
      weekSelected = true;
    }

    function createCalendar() {
      const firstDay = new Date(year, month, 1);
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      // Gjør søndag om fra 0 til 7, slik at mandag blir start på uken
      const firstWeekday = firstDay.getDay() === 0 ? 7 : firstDay.getDay();

      // Tomme ruter før 1. juli
      for (let i = 1; i < firstWeekday; i++) {
        const emptyDay = document.createElement("button");
        emptyDay.classList.add("day", "empty");
        emptyDay.disabled = true;
        calendar.appendChild(emptyDay);
      }

      // Dager i juli
      for (let day = 1; day <= daysInMonth; day++) {
        const dayButton = document.createElement("button");
        dayButton.classList.add("day");
        dayButton.textContent = day;

        const isAvailable = day >= availableStart && day <= availableEnd;

        if (isAvailable) {
          dayButton.classList.add("available");

          dayButton.addEventListener("click", () => {
            selectAvailableWeek();
          });
        } else {
          dayButton.disabled = true;
        }

        calendar.appendChild(dayButton);
      }
    }

    bookButton.addEventListener("click", () => {
      if (!weekSelected) return;
      modalOverlay.classList.add("show");
    });

    closeModal.addEventListener("click", () => {
      modalOverlay.classList.remove("show");
    });

    modalOverlay.addEventListener("click", event => {
      if (event.target === modalOverlay) {
        modalOverlay.classList.remove("show");
      }
    });

    createCalendar();
  </script>
</body>
</html>
